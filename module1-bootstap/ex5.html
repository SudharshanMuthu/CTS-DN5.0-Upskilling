<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 5</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">
        Bootstrap Alignment and Reordering
    </h1>

    <!-- Exercise 5.1 -->

    <h2 class="mb-3">
        Center Alignment Example
    </h2>

    <div class="row justify-content-center align-items-center bg-light"
         style="height:200px;">

        <div class="col-4">

            <div class="card p-3 text-center">

                Centered Content

            </div>

        </div>

    </div>

    <hr class="my-5">

    <!-- Exercise 5.2 -->

    <h2 class="mb-3">
        Column Reordering Example
    </h2>

    <div class="row">

        <div class="col-md-6 order-md-2">

            <div class="card p-3 bg-warning">

                First Column in Mobile
                <br>
                Second Column in Desktop

            </div>

        </div>

        <div class="col-md-6 order-md-1">

            <div class="card p-3 bg-info">

                Second Column in Mobile
                <br>
                First Column in Desktop

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
