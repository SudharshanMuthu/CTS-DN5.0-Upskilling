<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 16</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 mb-5">

    <h1 class="text-center text-primary mb-5">
        Bootstrap Position Utilities
    </h1>

    <!-- Exercise 16.1 -->

    <h2 class="mb-4">
        Fixed Footer Example
    </h2>

    <div class="alert alert-info">
        Scroll the page and notice the footer remains fixed at the bottom.
    </div>

    <hr class="my-5">

    <!-- Exercise 16.2 -->

    <h2 class="mb-4">
        Badge Overlay Example
    </h2>

    <div class="position-relative d-inline-block">

        <img
        src="https://via.placeholder.com/250"
        alt="Event Image"
        class="img-fluid">

        <span
        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

            New

        </span>

    </div>

</div>

<!-- Fixed Footer -->

<footer
class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center p-3">

    Community Event Portal © 2026

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
